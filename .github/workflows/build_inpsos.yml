name: Build inpsos

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y nasm gcc-multilib genisoimage

    - name: Compile and Build ISO/Image
      run: |
        make

    - name: Upload Built Images
      uses: actions/upload-artifact@v4
      with:
        name: inpsos-builds
        path: |
          inpsos.iso
          inpsos.img